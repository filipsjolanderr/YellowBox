name: 'Release'
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            binary_path: 'src-tauri/bin/ffmpeg-aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            binary_path: 'src-tauri/bin/ffmpeg-x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            binary_path: 'src-tauri/bin/ffmpeg-x86_64-pc-windows-msvc.exe'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install frontend dependencies
        run: bun install

      - name: Cache FFmpeg Binaries
        uses: actions/cache@v4
        id: cache-ffmpeg
        with:
          path: src-tauri/bin
          key: ${{ runner.os }}-ffmpeg-v6.1

      - name: Download FFmpeg Binaries
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: bun run scripts/setup-ffmpeg.js

      - name: Cache webkit2gtk (ubuntu only)
        uses: actions/cache@v4
        if: matrix.platform == 'ubuntu-22.04'
        id: cache-webkit2gtk
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-webkit2gtk-4.1

      - name: Install webkit2gtk (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Rename and upload release assets
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        env:
          ARTIFACT_PATHS: ${{ steps.tauri_build.outputs.artifactPaths }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const artifacts = JSON.parse(process.env.ARTIFACT_PATHS || '[]');
            const platform = '${{ matrix.platform }}';
            let os_name = 'windows';
            if (platform === 'macos-latest') os_name = 'macos';
            if (platform === 'ubuntu-22.04') os_name = 'linux';

            const tag_name = context.payload.release.tag_name;

            for (const assetPath of artifacts) {
              const parsed = path.parse(assetPath);
              const newName = `${parsed.name}-${os_name}${parsed.ext}`;
              const newPath = path.join(parsed.dir, newName);
              
              console.log(`Renaming ${assetPath} to ${newPath}`);
              fs.renameSync(assetPath, newPath);
              
              console.log(`Uploading ${newPath} to release ${tag_name}`);
              execSync(`gh release upload ${tag_name} "${newPath}" --clobber`, { 
                stdio: 'inherit',
                env: process.env 
              });
            }
