name: 'Release'
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install frontend dependencies
        run: bun install

      - name: Install webkit2gtk (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Create sidecar directory
        run: mkdir -p src-tauri/bin

      - name: Rename and copy FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cp $(which ffmpeg) src-tauri/bin/ffmpeg-x86_64-pc-windows-msvc.exe

      - name: Rename and copy FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          cp $(which ffmpeg) src-tauri/bin/ffmpeg-x86_64-unknown-linux-gnu

      - name: Rename and copy FFmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          cp $(which ffmpeg) src-tauri/bin/ffmpeg-aarch64-apple-darwin

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Yellowbox v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
