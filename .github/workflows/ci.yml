name: 'CI'
on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Cache FFmpeg Binaries
        uses: actions/cache@v4
        id: cache-ffmpeg
        with:
          path: src-tauri/bin
          key: ${{ runner.os }}-ffmpeg-v6.1

      - name: Download FFmpeg Binaries
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: bun run scripts/setup-ffmpeg.js

      - name: Cache webkit2gtk (ubuntu only)
        uses: actions/cache@v4
        if: matrix.platform == 'ubuntu-22.04'
        id: cache-webkit2gtk
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-webkit2gtk-4.1

      - name: Install webkit2gtk (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build and Test Tauri (Rust)
        run: |
          cd src-tauri
          cargo test ${{ matrix.args }}
          cargo build --release ${{ matrix.args }}
